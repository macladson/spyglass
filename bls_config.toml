[paths]
# Path to the Lighthouse repository root.
lighthouse_dir = "~/work/lighthouse-optimizations"

[lighthouse]
# Network to profile (mainnet, gnosis, holesky, sepolia, etc.)
network = "mainnet"
# Checkpoint sync URL for bootstrapping state
checkpoint_sync_url = "https://beaconstate.info"
# Extra flags passed to `lighthouse bn`
extra_flags = ["--subscribe-all-subnets", "--import-all-attestations", "--beacon-processor-attestation-batch-size 256"]
# Beacon API HTTP port
http_port = 5052
# Prometheus metrics port
metrics_port = 5054

[profiling]
# Run nickname
nickname = "super-batch-bs256"
# Base output directory for profile results
output_dir = "./profiles"
# Cargo build profile: use "release" or "release-debug"
profile = "release"
# perf sampling frequency (Hz).
perf_frequency = 1000
# Disable backfill sync (recommended for profiling)
disable_backfill = true
# Slot within the epoch to start recording (0-31)
start_slot = 16
# Slot within the epoch to stop recording (0-31)
end_slot = 15

[filtering]
# Seconds before an epoch boundary to include in "epoch-boundary" filter
epoch_boundary_warmup = 12
# Seconds after an epoch boundary to include in "epoch-boundary" filter
epoch_boundary_cooldown = 12

[mock_el]
# Address for the mock execution layer
listen_address = "127.0.0.1"
listen_port = 8551
