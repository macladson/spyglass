[paths]
# Path to the Lighthouse repository root.
# Supports absolute paths, ~ expansion, or relative (resolved from this file's dir).
lighthouse_dir = "~/path/to/lighthouse_dir"

[lighthouse]
# Network to profile (mainnet, gnosis, holesky, sepolia, etc.)
network = "mainnet"
# Checkpoint sync URL for bootstrapping state
checkpoint_sync_url = "https://mainnet.checkpoint.sigp.io"
# Extra flags passed to `lighthouse bn`
extra_flags = ["--subscribe-all-subnets", "--import-all-attestations"]
# Beacon API HTTP port (for epoch boundary detection)
http_port = 5052
# Prometheus metrics port
metrics_port = 5054

[profiling]
# perf sampling frequency (Hz). 1000 is sufficient for most analysis;
# higher values produce larger perf.data files.
perf_frequency = 1000
# Cargo build profile: "release" (recommended) or "release-debug"
profile = "release"
# Disable backfill sync (recommended for profiling)
disable_backfill = true
# Base output directory for profile results
output_dir = "./profiles"
# Run nickname. If set, used as the subdirectory name instead of the branch name.
nickname = ""
# Slot within the epoch to start recording (0-31). Default 16 = mid-epoch.
start_slot = 16
# Slot within the epoch to stop recording (0-31). Default 15 = one full epoch captured.
end_slot = 15

[filtering]
# Seconds before an epoch boundary to include in "epoch-boundary" filter
epoch_boundary_warmup = 6
# Seconds after an epoch boundary to include in "epoch-boundary" filter
epoch_boundary_cooldown = 6

[mock_el]
# Address for the mock execution layer
listen_address = "127.0.0.1"
listen_port = 8551
